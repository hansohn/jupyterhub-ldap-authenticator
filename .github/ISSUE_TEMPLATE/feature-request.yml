name: Feature Request
description: Suggest an idea for this project
title: "[Feat]: "
labels: [feat]
assignees:
  - hansohn

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Is your feature request related to a problem/challenge you are trying to solve?
      description: Please provide some additional context of why this feature or capability will be valuable.
    validations:
      required: true

  - type: textarea
    id: the-solution
    attributes:
      label: Describe the solution you'd like
      description: Please tell us a clear and concise description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Please provide aclear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: addtional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
